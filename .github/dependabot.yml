# Keeps SHA-pinned Actions and Python dev dependencies current. Because every
# third-party Action is pinned by commit SHA, Dependabot bumps the hash *and*
# its trailing version comment together, so the pin stays a pin while still
# receiving security updates. Satisfies the OpenSSF Scorecard
# "Dependency-Update-Tool" check.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  # Python deps. The pip ecosystem at "/" recursively covers pyproject.toml AND
  # the hash-pinned locks under requirements/ -- a separate /requirements entry
  # would only create duplicate PRs for the same file. Updates are grouped into
  # one PR (less noise, and co-dependent packages move together). After a bump,
  # refresh the universal multi-platform hashes with the `uv pip compile` command
  # in each lock file's header (Dependabot resolves for a single target only).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      python:
        patterns:
          - "*"
    ignore:
      # pydantic pins pydantic-core with an EXACT (==) version, so neither can be
      # bumped on its own in a flat, fully-pinned lock -- Dependabot can't
      # re-resolve the pair and produces an uninstallable lock either way. Let
      # `uv pip compile` move them together when you regenerate the lock.
      - dependency-name: "pydantic"
      - dependency-name: "pydantic-core"
