# Keeps SHA-pinned Actions and Python dev dependencies current. Because every
# third-party Action is pinned by commit SHA, Dependabot bumps the hash *and*
# its trailing version comment together, so the pin stays a pin while still
# receiving security updates. Satisfies the OpenSSF Scorecard
# "Dependency-Update-Tool" check.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  # Hash-pinned CI lock files under /requirements (dev.txt, build.txt),
  # installed with `pip install --require-hashes` so OpenSSF Scorecard's
  # Pinned-Dependencies check sees CI deps pinned by hash. Dependabot bumps the
  # pinned versions + hashes. After a bump, refresh the universal multi-platform
  # hash set with the `uv pip compile` command in each file's header (Dependabot
  # resolves for a single target only).
  - package-ecosystem: "pip"
    directory: "/requirements"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
