name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lint + type-check on a single modern Python.
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install package + dev tools
        # Hash-pinned toolchain via --require-hashes (Scorecard Pinned-
        # Dependencies). dev.txt also pins the runtime dep, so the package is
        # installed editable with --no-deps. Regenerate per dev.txt's header.
        run: |
          python -m pip install --require-hashes -r requirements/dev.txt
          python -m pip install -e . --no-deps
      - name: Ruff (lint)
        run: ruff check src tests
      - name: Ruff (format check)
        run: ruff format --check src tests
      - name: Mypy (strict)
        run: mypy src

  # Unit tests across supported Pythons. Airflow is NOT installed here: the
  # plugin degrades cleanly without it (compat returns None, the plugin base
  # falls back to object), so this verifies our own code on every interpreter.
  unit:
    name: Unit (py${{ matrix.python-version }}, no Airflow)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        # Same hash-pinned toolchain as the lint job; see the note there.
        run: |
          python -m pip install --require-hashes -r requirements/dev.txt
          python -m pip install -e . --no-deps
      - name: Pytest
        # Collect coverage on one interpreter and upload it; the rest just run.
        run: |
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            pytest -q --cov=airflow_pytest_plugin --cov-report=xml --cov-report=term-missing
          else
            pytest -q
          fi
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: ./coverage.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Integration: install a REAL Airflow 3 and confirm the plugin, the producer
  # parser, and the FastAPI app import and build against the actual runtime.
  integration:
    name: Integration (Airflow ${{ matrix.airflow }}, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - airflow: "3.0.6"
            python-version: "3.11"
            constraint: "3.11"
          - airflow: "3.2.1"
            python-version: "3.12"
            constraint: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Airflow (with official constraints) + package
        run: |
          CONSTRAINT="https://raw.githubusercontent.com/apache/airflow/constraints-${{ matrix.airflow }}/constraints-${{ matrix.constraint }}.txt"
          pip install "apache-airflow==${{ matrix.airflow }}" --constraint "${CONSTRAINT}"
          pip install -e ".[dev]"
      - name: Smoke-test imports against real Airflow
        run: |
          python -c "import airflow; print('Airflow', airflow.__version__)"
          python -c "from airflow_pytest_plugin import ArchivingResultParser, create_app; print('plugin import OK')"
          python -c "from airflow_pytest_plugin.plugin import PytestReportsPlugin as P; assert P.fastapi_apps, 'FastAPI app not registered'; print('plugin registers', [a['url_prefix'] for a in P.fastapi_apps])"
      - name: Run the suite against real Airflow
        run: pytest -q

  # Playwright UI regression tests: boot the standalone dev server against a seeded
  # report tree and drive a real browser. Opt-in suite (marker `ui`) — its own job so
  # the unit matrix stays fast and browser-free.
  ui:
    name: UI regression (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install package + UI test deps
        # Hash-pinned lock (Scorecard Pinned-Dependencies); regenerate per its header.
        run: |
          python -m pip install --require-hashes -r requirements/ui.txt
          python -m pip install -e . --no-deps
      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium
      - name: Run UI tests
        run: pytest -m ui tests/ui

  # Integration UI: boot a REAL Airflow 3 api-server with the plugin mounted and drive
  # Playwright against the embedded app (/pytest-reports/). Proves the plugin registers,
  # mounts and serves the working UI under Airflow's own runtime + auth manager. Airflow
  # is pinned via its official constraints (same approach as the `integration` job).
  ui-airflow:
    name: UI embedded in Airflow (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install Airflow + plugin + UI test deps
        run: |
          C="https://raw.githubusercontent.com/apache/airflow/constraints-3.2.1/constraints-3.12.txt"
          pip install "apache-airflow==3.2.1" --constraint "${C}"
          pip install -e ".[web,ui-test]"
      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium
      - name: Run embedded UI tests
        run: pytest -m ui_airflow tests/ui
