name: Publish to TestPyPI

# Manual dry-run of the publish pipeline against TestPyPI. Use before a real
# release to confirm Trusted Publishing, build, and metadata work end-to-end.
#
# One-time setup on TestPyPI (https://test.pypi.org/manage/account/publishing/):
#   Project: airflow-pytest-plugin  Owner: IKrysanov
#   Repository: airflow-pytest-plugin  Workflow: testpypi.yml  Environment: testpypi
# Then create a GitHub environment named "testpypi".

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install build tooling
        # Hash-pinned via --require-hashes (Scorecard Pinned-Dependencies).
        # Keep in sync with release.yml when bumping requirements/build.txt.
        run: python -m pip install --require-hashes -r requirements/build.txt
      - name: Build sdist and wheel
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist-testpypi
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/airflow-pytest-plugin/
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-testpypi
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
