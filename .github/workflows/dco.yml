name: DCO

# Verifies every commit in a PR carries a `Signed-off-by:` trailer (the
# Developer Certificate of Origin sign-off). Contributors sign off with
# `git commit -s`; see CONTRIBUTING.md for fixing commits missing the trailer.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: dco-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dco-check:
    name: Check Signed-off-by on all commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR commits
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          for sha in $(git rev-list "${BASE_SHA}..${HEAD_SHA}"); do
            author="$(git show -s --format='%an <%ae>' "$sha")"
            author_email="$(git show -s --format='%ae' "$sha")"
            subject="$(git show -s --format='%s' "$sha")"
            case "$author_email" in
              *"[bot]@users.noreply.github.com")
                echo "Skipping bot commit ${sha} by ${author} (\"${subject}\")."
                continue
                ;;
            esac
            if ! git show -s --format='%B' "$sha" \
                 | grep -qiE "^Signed-off-by: .+ <.+@.+>"; then
              echo "::error::Commit ${sha} (\"${subject}\") is missing a Signed-off-by line."
              echo "  Author: ${author}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "One or more commits are not signed off. Fix with:"
            echo "  git rebase --signoff ${BASE_SHA}"
            echo "  git push --force-with-lease"
            echo "See CONTRIBUTING.md (Developer Certificate of Origin)."
            exit 1
          fi
          echo "All commits are signed off."
