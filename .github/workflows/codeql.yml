name: CodeQL

# Static analysis (SAST) via GitHub CodeQL. Satisfies the OpenSSF Scorecard
# "SAST" check and surfaces issues as Code Scanning alerts in the Security tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "40 5 * * 1"   # Monday 05:40 UTC, just after the Scorecard run

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          languages: python
          queries: security-and-quality
          # SAST targets shipped code only. tests/ and examples/ carry their own
          # idioms (asserts with side-effects, a regex that scans our own HTML in
          # a syntax-check test) that are not production vulnerabilities and
          # shouldn't gate PRs -- scope the analysis to the package.
          config: |
            paths:
              - src
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          category: "/language:python"
